name: code_editor_android
description: A simple code editor for Android with GitHub integration.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0
  http: ^1.1.0
  # flutter_secure_storage dihapus karena bikin build gagal
  # code_field dihapus untuk menghindari build error
  # highlight: ^0.7.0  <-- DIHAPUS (sudah pakai regex manual)
  flutter_colorpicker: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/