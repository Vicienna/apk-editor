name: Build and Release APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Clean and Install dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Prepare local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      - name: Build APK (Bypass Path Check)
        run: |
          # Jalankan build, jika Flutter menganggap gagal hanya karena salah jalur, tetap lanjutkan script
          flutter build apk --release || true
          
          # Validasi apakah file APK benar-benar buatan Gradle ada di suatu tempat
          echo "--- Mencari lokasi asli file APK ---"
          find . -name "*.apk"
          
          # Jika tidak ada APK sama sekali yang terbentuk, barulah gagalkan workflow
          if [ -z "$(find . -name '*.apk' -not -path '*/intermediates/*')" ]; then
            echo "Eror: Gradle benar-benar gagal membuat APK!"
            exit 1
          fi

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            build/app/outputs/flutter-apk/*.apk
            android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
