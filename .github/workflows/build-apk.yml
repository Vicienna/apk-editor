name: Build and Release APK

# Hanya jalan saat lu push tag yang diawali 'v' (contoh: v1.0.0, v2.0.1)
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Penting biar tag history tersedia

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Clean and Install dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Patch Android configuration
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          if ! grep -q "flutter {" android/app/build.gradle; then
            echo -e "\nflutter {\n    source '../..'\n}" >> android/app/build.gradle
          fi

      - name: Generate App Icons
        run: flutter pub run flutter_launcher_icons:main

      - name: Build APK
        run: flutter build apk --release

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v1
        with:
          # Ambil nama tag asli (misal: v1.0.0)
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
